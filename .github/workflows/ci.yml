name: Vibe-Model CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # Only run for the repo owner's actions (pushes/PRs)
    if: |
      (github.event_name == 'push' && github.actor == github.repository_owner) ||
      (github.event_name == 'pull_request' && github.event.pull_request.author_association == 'OWNER') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout vibe-model
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Git Test Structure
        run: |
          ./scripts/setup_example_repo.sh

      - name: Install Dependencies
        run: bun install

      - name: Type Check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Prepare Test Journey
        run: |
          echo "Git test structure ready at:"
          echo "  Remote: $(pwd)/example/remote"
          echo "  Source: $(pwd)/example/src"
          echo ""
          echo "To run a test journey in CI, configure API keys as secrets:"
          echo "  - ANTHROPIC_API_KEY (for Claude)"
          echo "  - GEMINI_API_KEY (for Gemini)"
