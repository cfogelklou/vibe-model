name: Vibe-Model CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # Only run for the repo owner's actions (pushes/PRs)
    if: |
      (github.event_name == 'push' && github.actor == github.repository_owner) ||
      (github.event_name == 'pull_request' && github.event.pull_request.author_association == 'OWNER') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout vibe-model
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Git Test Structure
        run: |
          ./scripts/setup_example_repo.sh

      - name: Install Dependencies
        run: bun install

      - name: Type Check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Run Vibe-Model Test Journey
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd example/src
          ../../bin/vibe-model -g -v "Build a pig latinifier CLI in C++ using CMake and CTest that converts text to pig latin. Use minimal testing - just verify the basic conversion works."

      - name: Build and Test Generated App
        run: |
          cd example/src
          cmake -B build
          cmake --build build
          ctest --test-dir build

      - name: Verify Pig Latinifier Output
        run: |
          cd example/src
          OUTPUT=$(./build/pig-latin "is this pig latin")
          EXPECTED="siay hisay igpay atinlay"
          if [ "$OUTPUT" = "$EXPECTED" ]; then
            echo "✅ Pig latinifier test passed!"
          else
            echo "❌ Test failed: expected '$EXPECTED', got '$OUTPUT'"
            exit 1
          fi
