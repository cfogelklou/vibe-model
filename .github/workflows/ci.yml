name: Vibe-Model CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vibe-model
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Git Test Structure
        run: |
          mkdir -p example/remote example/src
          git -C example/remote init --bare
          git -C example/src init
          git -C example/src config user.name "CI Bot"
          git -C example/src config user.email "ci@vibe-model.local"
          echo "# Test" > example/src/README.md
          git -C example/src add README.md
          git -C example/src commit -m "Initial commit"
          git -C example/src remote add origin ../remote
          git -C example/src push -u origin main

      - name: Install Dependencies
        run: bun install

      - name: Type Check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Prepare Test Journey
        run: |
          echo "Git test structure ready at:"
          echo "  Remote: $(pwd)/example/remote"
          echo "  Source: $(pwd)/example/src"
          echo ""
          echo "To run a test journey in CI, configure API keys as secrets:"
          echo "  - ANTHROPIC_API_KEY (for Claude)"
          echo "  - GEMINI_API_KEY (for Gemini)"
